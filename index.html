<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PackAi – Immersive AI Experience</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b0f17;
            height: 100vh;
        }
        /* Three.js canvas fills background */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        #chat-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(70, 130, 255, 0.2) inset;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
            100% { transform: translate(-50%, -50%) translateY(0px); }
        }
        #header {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(100, 180, 255, 0.4);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        #header h1 {
            color: #a5f3fc;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 20px #00aaff;
            margin-right: auto;
        }
        #mode-selector {
            background: rgba(20, 30, 50, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px #3b82f6;
        }
        #mode-selector option {
            background: #1e2b45;
            color: white;
        }
        #header .badge {
            background: rgba(37, 99, 235, 0.7);
            color: white;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
            white-space: nowrap;
        }
        #messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: rgba(30, 43, 69, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 1.1rem;
        }
        .user-message .avatar {
            background: rgba(37, 99, 235, 0.9);
        }
        .bubble {
            background: rgba(30, 43, 69, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 18px;
            border-radius: 24px;
            border-top-left-radius: 4px;
            color: #f0f4ff;
            line-height: 1.5;
            font-size: 1rem;
            word-break: break-word;
            border: 1px solid rgba(100, 180, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .user-message .bubble {
            background: rgba(37, 99, 235, 0.8);
            border-top-left-radius: 24px;
            border-top-right-radius: 4px;
            border-color: #3b82f6;
        }
        #input-area {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(100, 180, 255, 0.4);
            display: flex;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        #user-input {
            flex: 1;
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #3b82f6;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(59,130,246,0.3);
        }
        #user-input:focus {
            border-color: #a5f3fc;
            box-shadow: 0 0 25px #3b82f6;
        }
        #send-button {
            background: rgba(37, 99, 235, 0.9);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 60px;
            padding: 0 30px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        #send-button:hover {
            background: #1d4ed8;
            transform: scale(1.05);
            box-shadow: 0 0 30px #3b82f6;
        }
        .typing .bubble::after {
            content: '...';
            animation: dots 1.5s steps(3, end) infinite;
            display: inline-block;
            width: 24px;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        /* Scrollbar styling */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        /* Mobile styles – make it feel like a native app */
        @media (max-width: 600px) {
            #chat-container {
                width: 100%;
                height: 100vh;
                max-width: none;
                border-radius: 0;
                top: 0;
                left: 0;
                transform: none;
                animation: none;
                border: none;
                box-shadow: none;
                background: rgba(10, 20, 40, 0.7);
            }
            #header {
                padding: 12px 16px;
            }
            #header h1 {
                font-size: 1.5rem;
            }
            #mode-selector {
                font-size: 0.85rem;
                padding: 6px 12px;
            }
            .badge {
                display: none; /* hide on very small if needed */
            }
            #messages {
                padding: 16px;
            }
            .message {
                max-width: 90%;
            }
            .avatar {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .bubble {
                padding: 10px 16px;
                font-size: 0.95rem;
            }
            #input-area {
                padding: 12px 16px;
            }
            #user-input {
                padding: 12px 16px;
            }
            #send-button {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Three.js canvas will be injected here -->
    <div id="chat-container">
        <div id="header">
            <h1>PackAi</h1>
            <select id="mode-selector">
                <option value="default" selected>🌐 Default (all)</option>
                <option value="cuss">💬 Cuss</option>
                <option value="human">🧑 Human</option>
                <option value="logic">🧠 Logic</option>
                <option value="sarcasm">😏 Sarcasm</option>
                <option value="heroic">🦸 Heroic</option>
                <option value="language">🌍 Language</option>
            </select>
            <span class="badge">neural core · online</span>
        </div>
        <div id="messages">
            <div class="message">
                <div class="avatar">P</div>
                <div class="bubble">Hello, I'm PackAi. Choose a mode above to get started.</div>
            </div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autofocus>
            <button id="send-button">Send</button>
        </div>
    </div>

    <!-- Three.js Library -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene, Camera, Renderer (unchanged) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // --- Lights (unchanged) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0x4488ff, 1, 10);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        
        // --- Particle system (galaxy) unchanged ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 8000;
        
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            const radius = 2 + Math.random() * 4;
            const angle = Math.random() * Math.PI * 2;
            const height = (Math.random() - 0.5) * 5;
            const armAngle = angle + radius * 0.5;
            const x = Math.cos(armAngle) * radius;
            const y = height;
            const z = Math.sin(armAngle) * radius;
            
            posArray[i] = x;
            posArray[i+1] = y;
            posArray[i+2] = z;
            
            const color = new THREE.Color();
            const hue = 0.6 + Math.random() * 0.2;
            const saturation = 0.8;
            const lightness = 0.5 + Math.random() * 0.4;
            color.setHSL(hue, saturation, lightness);
            
            colorArray[i] = color.r;
            colorArray[i+1] = color.g;
            colorArray[i+2] = color.b;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        
        // --- Stars (unchanged) ---
        const starGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const starMaterial = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224488 });
        for (let i = 0; i < 30; i++) {
            const star = new THREE.Mesh(starGeometry, starMaterial);
            const r = 3 + Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI - Math.PI/2;
            star.position.set(
                r * Math.cos(theta) * Math.cos(phi),
                r * Math.sin(phi),
                r * Math.sin(theta) * Math.cos(phi)
            );
            scene.add(star);
        }
        
        // --- Central core (unchanged) ---
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0x3366ff, emissive: 0x112244 })
        );
        coreGlow.position.set(0, 0, 0);
        scene.add(coreGlow);
        
        // --- Lines (unchanged) ---
        const linesCount = 100;
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = [];
        for (let i = 0; i < linesCount; i++) {
            const start = new THREE.Vector3(
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8
            );
            const end = new THREE.Vector3(
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8
            );
            linePositions.push(start.x, start.y, start.z);
            linePositions.push(end.x, end.y, end.z);
        }
        lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x3366aa, transparent: true, opacity: 0.15 });
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = performance.now() / 1000;
            
            particlesMesh.rotation.y = elapsedTime * 0.05;
            particlesMesh.rotation.x = Math.sin(elapsedTime * 0.2) * 0.1;
            lines.rotation.y = elapsedTime * 0.02;
            
            camera.position.x = Math.sin(elapsedTime * 0.1) * 1;
            camera.position.y = Math.cos(elapsedTime * 0.15) * 0.5;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <!-- PackAi Script (modified for dynamic mode switching) -->
    <script src="script.js"></script>
</body>
</html>
