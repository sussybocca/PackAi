<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIPO · build & share</title>
    <!-- Ace editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e2f;
            height: 100vh;
            overflow: hidden;
            color: #ddd;
        }
        /* main studio */
        #studio {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .user-bar {
            background: #161625;
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d44;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: #2f3a6b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .new-post-btn {
            background: #2d4a3b;
            border: none;
            color: #b0ffd0;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            border: 1px solid #2e8b57;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .main-panel {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .posts-sidebar {
            width: 320px;
            background: #1c1c2e;
            border-right: 2px solid #2a2a42;
            padding: 1rem;
            overflow-y: auto;
        }
        .post-card {
            background: #252538;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #7f6aee;
            cursor: pointer;
            transition: 0.1s;
        }
        .post-card:hover {
            background: #2f2f4a;
        }
        .post-card.active {
            background: #3e3e64;
            border-left-color: #ffb347;
        }
        .post-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c0d0ff;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #8a8aaa;
            margin: 0.3rem 0;
        }
        .post-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e2a;
        }
        .toolbar {
            background: #161625;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid #2d2d44;
        }
        .toolbar button {
            background: #2d2d44;
            border: none;
            color: #ccc;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #40405c;
        }
        .toolbar button:hover {
            background: #3d3d60;
            color: white;
        }
        .toolbar .spacer {
            flex: 1;
        }
        .toolbar .push-btn {
            background: #2d4a3b;
            border-color: #2e8b57;
            color: #b0ffd0;
        }
        .editor-pane {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .file-tree {
            width: 320px;
            background: #1c1c2e;
            border-right: 2px solid #2a2a42;
            padding: 1rem 0.5rem 1rem 1rem;
            overflow-y: auto;
            user-select: none;
            font-size: 0.95rem;
        }
        .tree-root {
            list-style: none;
            padding-left: 0.5rem;
        }
        .tree-node {
            list-style: none;
            margin: 2px 0;
            white-space: nowrap;
        }
        .tree-node .item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px 4px 4px;
            border-radius: 8px;
            cursor: default;
            background: #252538;
            margin: 2px 0;
            border: 1px solid transparent;
            transition: background 0.1s;
        }
        .tree-node .item-row:hover {
            background: #2f2f4a;
            border-color: #4f4f7a;
        }
        .tree-node .item-row.selected {
            background: #3e3e64;
            border-left: 4px solid #7f6aee;
        }
        .item-row.dragover {
            background: #4a4a7a !important;
            border: 1px dashed #b8a9ff;
        }
        .item-row i {
            width: 20px;
            color: #b0b0da;
        }
        .item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .folder-children {
            list-style: none;
            padding-left: 24px;
            margin-left: 8px;
            border-left: 1px dotted #3a3a5a;
        }
        .empty-folder {
            color: #6a6a8a;
            font-style: italic;
            padding-left: 28px;
            font-size: 0.85rem;
        }
        #editor {
            flex: 1;
            height: 100%;
            font-size: 14px;
        }
        .social-panel {
            background: #161625;
            border-top: 1px solid #2d2d44;
            padding: 1rem 2rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .like-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .like-btn {
            background: transparent;
            border: 1px solid #7f6aee;
            color: #7f6aee;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .like-btn.liked {
            background: #7f6aee;
            color: white;
        }
        .fork-btn {
            background: #553c9a;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .comments-section {
            margin-top: 1rem;
        }
        .comment {
            background: #252538;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .comment-meta {
            font-size: 0.8rem;
            color: #8a8aaa;
        }
        .comment-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .comment-input input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #3a3a5a;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
        }
        .comment-input button {
            background: #7f6aee;
            border: none;
            border-radius: 30px;
            padding: 0 1.5rem;
            color: white;
        }
        .dragging-ghost {
            background: #4c3c8c;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 16px black;
        }
        i.fa-folder { color: #7a95e0; }
        i.fa-file { color: #b0b0d0; }
    </style>
</head>
<body>
<div id="studio">
    <div class="user-bar">
        <div class="user-info">
            <div class="avatar" id="avatar">?</div>
            <span id="displayName">Loading...</span>
        </div>
        <button id="newPostBtn" class="new-post-btn"><i class="fas fa-plus"></i> New PAIPO</button>
    </div>

    <div class="main-panel">
        <!-- posts sidebar -->
        <div class="posts-sidebar" id="postsSidebar">
            <div style="margin-bottom: 1rem; color: #8a8aaa;">🔥 PAIPOs</div>
            <div id="postsList"></div>
        </div>

        <!-- content area -->
        <div class="content-area">
            <div class="toolbar">
                <button id="newFileBtn"><i class="fas fa-file"></i> new file</button>
                <button id="newFolderBtn"><i class="fas fa-folder-plus"></i> new folder</button>
                <button id="deleteBtn"><i class="fas fa-trash-alt"></i> delete</button>
                <span class="spacer"></span>
                <button id="saveBtn"><i class="fas fa-save"></i> save</button>
                <button id="pushBtn" class="push-btn"><i class="fab fa-github"></i> push to PAIPO</button>
            </div>
            <div class="editor-pane">
                <div class="file-tree" id="fileTreeContainer"></div>
                <div id="editor"></div>
            </div>
            <!-- social panel -->
            <div class="social-panel" id="socialPanel">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="like-btn" id="likeBtn"><i class="far fa-heart"></i> <span id="likeCount">0</span></button>
                    <button class="fork-btn" id="forkBtn"><i class="fas fa-code-branch"></i> fork</button>
                </div>
                <div class="comments-section" id="commentsSection"></div>
                <div class="comment-input">
                    <input type="text" id="commentInput" placeholder="write a comment...">
                    <button id="postCommentBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIG ----------
        const API_ENDPOINT = '/.netlify/functions/paipo-api';

        // ---------- STATE ----------
        let anonymousId = localStorage.getItem('paipo_anon_id');
        let displayName = localStorage.getItem('paipo_display_name');
        let currentPostId = null;
        let posts = [];
        let items = []; // file tree items (same format as original)
        let selectedFileId = null;
        let aceEditor = null;

        // Root folder id
        const ROOT_ID = 'root';

        // ---------- UTILS ----------
        function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 9); }

        function getItem(id) { return items.find(it => it.id === id); }
        function getChildren(parentId) { return items.filter(it => it.parent === parentId).sort((a,b) => a.name.localeCompare(b.name)); }

        // Check if descendant (for drag safety)
        function isDescendant(descendantId, ancestorId) {
            if (descendantId === ancestorId) return true;
            let item = getItem(descendantId);
            while (item && item.parent) {
                if (item.parent === ancestorId) return true;
                item = getItem(item.parent);
            }
            return false;
        }

        // Build full path for an item (for pushing to GitHub)
        function buildPath(itemId) {
            const item = getItem(itemId);
            if (!item) return '';
            if (item.id === ROOT_ID) return '';
            const parentPath = buildPath(item.parent);
            return parentPath ? `${parentPath}/${item.name}` : item.name;
        }

        // ---------- API CALL ----------
        async function callAPI(action, payload = {}) {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || 'API error');
            }
            return await response.json();
        }

        // ---------- USER INIT ----------
        async function initUser() {
            if (!anonymousId) {
                anonymousId = crypto.randomUUID();
                localStorage.setItem('paipo_anon_id', anonymousId);
                const adj = ['Anonymous','Mysterious','Silent','Wandering','Curious','Brave','Clever','Gentle','Fierce','Happy'];
                const noun = ['Penguin','Koala','Fox','Wolf','Eagle','Badger','Otter','Raccoon','Sloth','Hedgehog'];
                const num = Math.floor(Math.random()*9000+1000);
                displayName = adj[Math.floor(Math.random()*adj.length)] + ' ' + noun[Math.floor(Math.random()*noun.length)] + ' #' + num;
                localStorage.setItem('paipo_display_name', displayName);
            } else {
                displayName = localStorage.getItem('paipo_display_name') || 'Anonymous';
            }
            document.getElementById('avatar').innerText = displayName.charAt(0);
            document.getElementById('displayName').innerText = displayName;

            // Ensure user in DB
            await callAPI('ensureUser', { anonymousId, displayName });
        }

        // ---------- LOAD POSTS ----------
        async function loadPosts() {
            const data = await callAPI('getPosts');
            posts = data.posts;
            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('postsList');
            container.innerHTML = '';
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = `post-card ${currentPostId === post.id ? 'active' : ''}`;
                card.dataset.id = post.id;
                card.innerHTML = `
                    <div class="post-title">${post.title}</div>
                    <div class="post-meta">${new Date(post.created_at).toLocaleDateString()}</div>
                    <div class="post-stats">
                        <span><i class="far fa-heart"></i> ${post.likes_count}</span>
                        <span><i class="far fa-comment"></i> ${post.comments_count}</span>
                        <span><i class="fas fa-code-branch"></i> ${post.forks_count}</span>
                    </div>
                `;
                card.addEventListener('click', () => selectPost(post.id));
                container.appendChild(card);
            });
        }

        // ---------- SELECT POST ----------
        async function selectPost(postId) {
            currentPostId = postId;
            renderPosts(); // update active

            // Load files from GitHub via API
            const data = await callAPI('getPostFiles', { postId });
            buildItemsFromFiles(data.files || []);
            renderTree();
            // Select first file if any
            const firstFile = items.find(it => it.type === 'file' && it.id !== ROOT_ID);
            if (firstFile) selectFile(firstFile.id);

            // Load social data
            loadLikes();
            loadComments();
        }

        // Build items array from flat file list (paths like 'folder/file.js')
        function buildItemsFromFiles(files) {
            items = [{ id: ROOT_ID, name: 'root', type: 'folder', parent: null, content: null }];
            files.forEach(file => {
                const parts = file.path.split('/');
                let currentParent = ROOT_ID;
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    const isFile = i === parts.length - 1;
                    const existing = items.find(it => it.parent === currentParent && it.name === part);
                    if (existing) {
                        currentParent = existing.id;
                        if (isFile) existing.content = file.content; // update content if already exists
                    } else {
                        const newId = genId();
                        items.push({
                            id: newId,
                            name: part,
                            type: isFile ? 'file' : 'folder',
                            parent: currentParent,
                            content: isFile ? file.content : null
                        });
                        currentParent = newId;
                    }
                }
            });
        }

        // ---------- RENDER TREE (identical to original) ----------
        function renderTree() {
            const container = document.getElementById('fileTreeContainer');
            container.innerHTML = ''; 
            const rootFolder = getItem(ROOT_ID);
            if (!rootFolder) return;
            const rootUl = document.createElement('ul');
            rootUl.className = 'tree-root';
            renderNode(ROOT_ID, rootUl, 0);
            container.appendChild(rootUl);
            attachDragDropListeners();
        }

        function renderNode(parentId, parentUl, depth) {
            const children = getChildren(parentId);
            if (children.length === 0) return;
            for (let child of children) {
                const li = document.createElement('li');
                li.className = 'tree-node';
                li.dataset.id = child.id;
                li.dataset.type = child.type;
                li.setAttribute('draggable', child.type === 'file' || child.type === 'folder');
                
                const row = document.createElement('div');
                row.className = `item-row ${selectedFileId === child.id ? 'selected' : ''}`;
                row.dataset.id = child.id;
                
                const icon = document.createElement('i');
                icon.className = child.type === 'folder' ? 'fas fa-folder' : 'fas fa-file-code';
                row.appendChild(icon);
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'item-name';
                nameSpan.textContent = child.name;
                row.appendChild(nameSpan);
                
                li.appendChild(row);
                
                if (child.type === 'folder') {
                    const childContainer = document.createElement('ul');
                    childContainer.className = 'folder-children';
                    renderNode(child.id, childContainer, depth+1);
                    if (getChildren(child.id).length === 0) {
                        const emptyLi = document.createElement('li');
                        emptyLi.className = 'empty-folder';
                        emptyLi.textContent = '⌀ empty';
                        childContainer.appendChild(emptyLi);
                    }
                    li.appendChild(childContainer);
                }
                
                parentUl.appendChild(li);
            }
        }

        // ---------- DRAG AND DROP (identical to original) ----------
        let draggedId = null;
        let currentDragoverFolderRow = null;

        function findFolderNode(element) {
            let current = element.closest('.tree-node');
            while (current) {
                if (current.dataset.type === 'folder') {
                    return current;
                }
                current = current.parentElement?.closest('.tree-node');
            }
            return null;
        }

        function attachDragDropListeners() {
            const treeContainer = document.getElementById('fileTreeContainer');
            
            treeContainer.ondragover = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                
                const folderNode = findFolderNode(e.target);
                if (!folderNode) {
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                        currentDragoverFolderRow = null;
                    }
                    return;
                }
                
                const folderRow = folderNode.querySelector('.item-row');
                if (folderRow && folderRow !== currentDragoverFolderRow) {
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                    }
                    folderRow.classList.add('dragover');
                    currentDragoverFolderRow = folderRow;
                }
            };
            
            treeContainer.ondragleave = (e) => {
                if (currentDragoverFolderRow) {
                    currentDragoverFolderRow.classList.remove('dragover');
                    currentDragoverFolderRow = null;
                }
            };
            
            treeContainer.ondrop = (e) => {
                e.preventDefault();
                if (currentDragoverFolderRow) {
                    currentDragoverFolderRow.classList.remove('dragover');
                    currentDragoverFolderRow = null;
                }
                
                const folderNode = findFolderNode(e.target);
                const targetId = folderNode ? folderNode.dataset.id : ROOT_ID;
                const targetItem = getItem(targetId);
                if (targetItem && targetItem.type !== 'folder') return;
                
                const dragged = draggedId || e.dataTransfer.getData('text/plain');
                if (!dragged) return;
                
                if (dragged === targetId || isDescendant(targetId, dragged)) {
                    alert('Cannot move a folder into itself or its subfolder.');
                    return;
                }
                const draggedItem = getItem(dragged);
                if (!draggedItem) return;
                
                draggedItem.parent = targetId;
                renderTree();
            };
            
            const allRows = document.querySelectorAll('.item-row');
            allRows.forEach(row => {
                const li = row.closest('.tree-node');
                if (!li) return;
                const id = li.dataset.id;
                const type = li.dataset.type;
                
                row.setAttribute('draggable', type === 'file' || type === 'folder');
                row.ondragstart = (e) => {
                    if (type !== 'file' && type !== 'folder') {
                        e.preventDefault();
                        return;
                    }
                    draggedId = id;
                    e.dataTransfer.setData('text/plain', id);
                    e.dataTransfer.effectAllowed = 'move';
                    const ghost = document.createElement('span');
                    ghost.className = 'dragging-ghost';
                    ghost.textContent = getItem(id)?.name || 'item';
                    document.body.appendChild(ghost);
                    e.dataTransfer.setDragImage(ghost, 20, 10);
                    setTimeout(() => document.body.removeChild(ghost), 0);
                };
                row.ondragend = () => { 
                    draggedId = null; 
                    if (currentDragoverFolderRow) {
                        currentDragoverFolderRow.classList.remove('dragover');
                        currentDragoverFolderRow = null;
                    }
                };
            });
        }

        // ---------- ACE EDITOR ----------
        function initAce() {
            aceEditor = ace.edit('editor');
            aceEditor.setTheme('ace/theme/tomorrow_night');
            aceEditor.session.setMode('ace/mode/text');
            aceEditor.setOptions({
                fontSize: '14px',
                showPrintMargin: false,
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true
            });
            aceEditor.setReadOnly(false);
            aceEditor.session.setValue('// select a file');
        }

        function selectFile(id) {
            const file = getItem(id);
            if (!file || file.type !== 'file') return;
            selectedFileId = id;
            aceEditor.session.setValue(file.content || '');
            const ext = file.name.split('.').pop();
            let mode = 'ace/mode/text';
            if (ext === 'html' || ext === 'htm') mode = 'ace/mode/html';
            else if (ext === 'css') mode = 'ace/mode/css';
            else if (ext === 'js') mode = 'ace/mode/javascript';
            else if (ext === 'json') mode = 'ace/mode/json';
            else if (ext === 'md') mode = 'ace/mode/markdown';
            aceEditor.session.setMode(mode);
            renderTree(); // update selected style
        }

        function saveCurrentFile() {
            if (!selectedFileId) { alert('No file selected'); return; }
            const file = getItem(selectedFileId);
            if (file && file.type === 'file') {
                file.content = aceEditor.session.getValue();
                renderTree(); 
            }
        }

        // ---------- FILE OPERATIONS ----------
        function newFile() {
            let parentId = ROOT_ID;
            if (selectedFileId) {
                const sel = getItem(selectedFileId);
                if (sel.type === 'folder') parentId = sel.id;
                else parentId = sel.parent;
            }
            const name = prompt('Enter file name (with extension):', 'newfile.js');
            if (!name) return;
            const newId = genId();
            items.push({
                id: newId,
                name: name,
                type: 'file',
                parent: parentId,
                content: '// new file\n'
            });
            renderTree();
            selectFile(newId);
        }

        function newFolder() {
            let parentId = ROOT_ID;
            if (selectedFileId) {
                const sel = getItem(selectedFileId);
                if (sel.type === 'folder') parentId = sel.id;
                else parentId = sel.parent;
            }
            const name = prompt('Folder name:', 'new folder');
            if (!name) return;
            items.push({
                id: genId(),
                name: name,
                type: 'folder',
                parent: parentId,
                content: null
            });
            renderTree();
        }

        function deleteSelected() {
            if (!selectedFileId) { alert('select a file/folder to delete'); return; }
            if (selectedFileId === ROOT_ID) { alert('cannot delete root'); return; }
            if (!confirm('Permanently delete? This will also delete all children.')) return;
            const idsToDelete = new Set();
            function collect(id) {
                idsToDelete.add(id);
                getChildren(id).forEach(child => collect(child.id));
            }
            collect(selectedFileId);
            items = items.filter(it => !idsToDelete.has(it.id));
            selectedFileId = null;
            aceEditor.session.setValue('// item deleted');
            renderTree();
        }

        // ---------- PUSH FILES ----------
        async function pushFiles() {
            if (!currentPostId) return alert('Select a post first');
            saveCurrentFile();
            // Build flat file list with paths
            const files = items.filter(it => it.type === 'file' && it.id !== ROOT_ID).map(f => ({
                path: buildPath(f.id),
                content: f.content
            }));
            await callAPI('pushFiles', { postId: currentPostId, files });
            alert('Files pushed!');
        }

        // ---------- LIKES ----------
        async function loadLikes() {
            if (!currentPostId) return;
            const data = await callAPI('getLikes', { postId: currentPostId });
            document.getElementById('likeCount').innerText = data.count;
            // Check if current user liked
            const userLiked = data.likes.some(l => l.anonymous_id === anonymousId);
            const likeBtn = document.getElementById('likeBtn');
            if (userLiked) likeBtn.classList.add('liked');
            else likeBtn.classList.remove('liked');
        }

        async function toggleLike() {
            if (!currentPostId) return;
            const liked = document.getElementById('likeBtn').classList.contains('liked');
            if (liked) {
                await callAPI('unlikePost', { postId: currentPostId, anonymousId });
            } else {
                await callAPI('likePost', { postId: currentPostId, anonymousId });
            }
            loadLikes();
        }

        // ---------- COMMENTS ----------
        async function loadComments() {
            if (!currentPostId) return;
            const data = await callAPI('getComments', { postId: currentPostId });
            const container = document.getElementById('commentsSection');
            container.innerHTML = '';
            data.comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment';
                div.innerHTML = `
                    <div class="comment-meta">${c.user?.display_name || 'Anonymous'}</div>
                    <div>${c.content}</div>
                `;
                container.appendChild(div);
            });
        }

        async function postComment() {
            const text = document.getElementById('commentInput').value.trim();
            if (!text || !currentPostId) return;
            await callAPI('addComment', { postId: currentPostId, anonymousId, content: text });
            document.getElementById('commentInput').value = '';
            loadComments();
        }

        // ---------- FORK ----------
        async function forkPost() {
            if (!currentPostId) return;
            const title = prompt('Enter title for your forked PAIPO:', 'Forked PAIPO');
            if (!title) return;
            await callAPI('forkPost', { originalPostId: currentPostId, anonymousId, newTitle: title });
            alert('Fork created!');
            loadPosts();
        }

        // ---------- NEW POST ----------
        async function newPost() {
            const title = prompt('Enter PAIPO title:');
            if (!title) return;
            await callAPI('createPost', { anonymousId, title, description: '' });
            alert('Post created!');
            loadPosts();
        }

        // ---------- EVENT LISTENERS ----------
        document.getElementById('newPostBtn').addEventListener('click', newPost);
        document.getElementById('newFileBtn').addEventListener('click', newFile);
        document.getElementById('newFolderBtn').addEventListener('click', newFolder);
        document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentFile);
        document.getElementById('pushBtn').addEventListener('click', pushFiles);
        document.getElementById('likeBtn').addEventListener('click', toggleLike);
        document.getElementById('postCommentBtn').addEventListener('click', postComment);
        document.getElementById('forkBtn').addEventListener('click', forkPost);

        // Click on file tree to select
        document.addEventListener('click', (e) => {
            const row = e.target.closest('.item-row');
            if (!row) return;
            const li = row.closest('.tree-node');
            if (li) {
                const id = li.dataset.id;
                const item = getItem(id);
                if (item && item.type === 'file') selectFile(id);
            }
        });

        // ---------- INIT ----------
        (async function() {
            initAce();
            await initUser();
            await loadPosts();
        })();
    })();
</script>
</body>
</html>
